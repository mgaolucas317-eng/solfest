<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Solfest On The Road</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <a href="index.html">
                        <img src="images/logo.png" alt="Solfest Logo" id="logo-img">
                        <span class="logo-text">SOLFEST ON THE ROAD</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>
    <section class="page-header">
        <div class="container">
            <h1>Checkout</h1>
            <p class="breadcrumb"><a href="index.html">Home</a> / <a href="index.html">Events</a> / <span>Checkout</span></p>
        </div>
    </section>
    <section class="checkout-section">
        <div class="container">
            <div class="checkout-grid">
                <div class="checkout-form-section">
                    <div class="checkout-steps">
                        <div class="step active" data-step="1">
                            <span class="step-number">1</span>
                            <span class="step-label">Contact Info</span>
                        </div>
                        <div class="step" data-step="2">
                            <span class="step-number">2</span>
                            <span class="step-label">Billing</span>
                        </div>
                        <div class="step" data-step="3">
                            <span class="step-number">3</span>
                            <span class="step-label">Payment</span>
                        </div>
                    </div>
                    <form class="checkout-form" id="checkoutForm">
                        <div class="form-section" id="contactSection">
                            <h3>Contact Information</h3>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>First Name *</label>
                                    <input type="text" name="firstName" required>
                                </div>
                                <div class="form-group">
                                    <label>Last Name *</label>
                                    <input type="text" name="lastName" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Email *</label>
                                <input type="email" name="email" required>
                            </div>
                            <div class="form-group">
                                <label>Phone *</label>
                                <input type="tel" name="phone" required>
                            </div>
                            <button type="button" class="btn-primary btn-block" id="nextToBilling">Continue to Billing</button>
                        </div>
                        <div class="form-section" id="billingSection" style="display: none;">
                            <h3>Billing Address</h3>
                            <div class="form-group">
                                <label>Address Line 1 *</label>
                                <input type="text" name="address1" required>
                            </div>
                            <div class="form-group">
                                <label>Address Line 2</label>
                                <input type="text" name="address2">
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>City *</label>
                                    <input type="text" name="city" required>
                                </div>
                                <div class="form-group">
                                    <label>Postal Code *</label>
                                    <input type="text" name="postalCode" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Country *</label>
                                <select name="country" required>
                                    <option value="">Select Country</option>
                                    <option value="UK">United Kingdom</option>
                                    <option value="US">United States</option>
                                    <option value="KE">Kenya</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                            <div class="checkout-actions">
                                <button type="button" class="btn-outline" id="backToContact">Back</button>
                                <button type="button" class="btn-primary" id="nextToPayment">Continue to Payment</button>
                            </div>
                        </div>
                        <div class="form-section" id="paymentSection" style="display: none;">
                            <h3>Payment Information</h3>
                            <div class="payment-methods">
                                <label class="payment-method">
                                    <input type="radio" name="paymentMethod" value="card" checked>
                                    <span><i class="fas fa-credit-card"></i> Credit/Debit Card</span>
                                </label>
                                <label class="payment-method">
                                    <input type="radio" name="paymentMethod" value="paypal">
                                    <span><i class="fab fa-paypal"></i> PayPal</span>
                                </label>
                            </div>
                            <div id="cardPayment">
                                <div class="form-group">
                                    <label>Card Number *</label>
                                    <input type="text" name="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19">
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Expiry Date *</label>
                                        <input type="text" name="expiryDate" placeholder="MM/YY" maxlength="5">
                                    </div>
                                    <div class="form-group">
                                        <label>CVV *</label>
                                        <input type="text" name="cvv" placeholder="123" maxlength="4">
                                    </div>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="terms" required>
                                    <span>I agree to the <a href="#">Terms & Conditions</a></span>
                                </label>
                            </div>
                            <div class="checkout-actions">
                                <button type="button" class="btn-outline" id="backToBilling">Back</button>
                                <button type="submit" class="btn-primary">Complete Purchase</button>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="order-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-items" id="summaryItems"></div>
                    <div class="summary-totals">
                        <div class="summary-row">
                            <span>Subtotal:</span>
                            <span id="summarySubtotal">$0.00</span>
                        </div>
                        <div class="summary-row">
                            <span>Processing Fee:</span>
                            <span id="summaryFee">$2.50</span>
                        </div>
                        <div class="summary-row summary-total">
                            <span>Total:</span>
                            <span id="summaryTotal">$0.00</span>
                        </div>
                    </div>
                    <div class="security-badges">
                        <i class="fas fa-lock"></i>
                        <span>Secure Checkout</span>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p class="copyright">&copy; 2026 Hustlesasa. All rights reserved.</p>
            </div>
        </div>
    </footer>
    <script src="js/main.js"></script>
</body>
</html>
